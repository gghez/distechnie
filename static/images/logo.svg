<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .logo-text { fill: #e0e0e0; }
        .logo-icon { stroke: #e0e0e0; }
        .logo-glitch { fill: #e0e0e0; opacity: 0.3; }
      }
    </style>
  </defs>

  <!-- Broken hexagon chip icon -->
  <g transform="translate(18, 30)">
    <!-- Hexagon outline - left half -->
    <path d="M-12,-7 L-12,7 L0,14 L6,11" fill="none" stroke="currentColor" class="logo-icon" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Hexagon outline - right half (offset/glitched) -->
    <path d="M8,10 L12,7 L12,-7 L0,-14 L-6,-11" fill="none" stroke="currentColor" class="logo-icon" stroke-width="1.8" stroke-linecap="round" transform="translate(1.5, -1)"/>
    <!-- Fracture line -->
    <line x1="-4" y1="-10" x2="5" y2="12" stroke="currentColor" class="logo-icon" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- Circuit dots -->
    <circle cx="0" cy="-14" r="1.5" fill="currentColor" class="logo-icon" opacity="0.7"/>
    <circle cx="0" cy="14" r="1.5" fill="currentColor" class="logo-icon" opacity="0.7"/>
    <circle cx="-12" cy="0" r="1.2" fill="currentColor" class="logo-icon" opacity="0.5"/>
    <!-- Inner circuit lines -->
    <line x1="-5" y1="-3" x2="0" y2="0" stroke="currentColor" class="logo-icon" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="5" y2="4" stroke="currentColor" class="logo-icon" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="2" fill="currentColor" class="logo-icon" opacity="0.6"/>
  </g>

  <!-- Text: DISTECHNIE with glitch slice -->
  <g transform="translate(40, 24)">
    <!-- Main text - top slice -->
    <clipPath id="top-clip">
      <rect x="0" y="-2" width="160" height="12"/>
    </clipPath>
    <clipPath id="bottom-clip">
      <rect x="0" y="10" width="160" height="14"/>
    </clipPath>
    <clipPath id="mid-clip">
      <rect x="0" y="7" width="160" height="6"/>
    </clipPath>

    <!-- Base text -->
    <text font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="currentColor" class="logo-text" letter-spacing="2">DISTECHNIE</text>

    <!-- Glitch offset slice (middle band shifted right) -->
    <text font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="currentColor" class="logo-glitch" letter-spacing="2" clip-path="url(#mid-clip)" dx="3" opacity="0.25">DISTECHNIE</text>
  </g>

  <!-- Subtle tagline -->
  <text x="40" y="46" font-family="'Courier New', monospace" font-size="7" fill="currentColor" class="logo-text" letter-spacing="4" opacity="0.5">DYSTOPIES TECHNIQUES</text>
</svg>
