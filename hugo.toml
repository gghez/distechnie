baseURL = 'https://gghez.github.io/distechnie/'
languageCode = 'fr'
defaultContentLanguage = 'fr'
title = 'Distechnie'
theme = 'hugo-book'

# Disable unused built-in taxonomies
[taxonomies]
  tag = 'tags'

[params]
  # Use the 'stories' section for sidebar navigation
  BookSection = 'stories'
  BookToC = true
  BookTheme = 'auto'
  BookSearch = true
  BookComments = false
  BookLogo = 'images/logo.svg'
  BookMenuBundle = '/menu'
  description = "Recueil de nouvelles dystopiques — quand la technologie dérape, l'humanité vacille."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ['HTML']
  section = ['HTML']
  page = ['HTML']
