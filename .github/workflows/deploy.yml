name: Deploy mdBook site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.44"
  PANDOC_VERSION: "3.6.4"
  KEPUBIFY_VERSION: "4.0.4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache mdBook and pandoc
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-mdbook-${{ env.MDBOOK_VERSION }}-pandoc-${{ env.PANDOC_VERSION }}-kepubify-${{ env.KEPUBIFY_VERSION }}

      - name: Install mdBook
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/mdbook.tar.gz
          tar -xzf /tmp/mdbook.tar.gz -C ~/tools

      - name: Install pandoc
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz" -o /tmp/pandoc.tar.gz
          tar -xzf /tmp/pandoc.tar.gz --strip-components=2 -C ~/tools "pandoc-${PANDOC_VERSION}/bin/pandoc"

      - name: Install kepubify
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/pgaskin/kepubify/releases/download/v${KEPUBIFY_VERSION}/kepubify-linux-64bit" -o ~/tools/kepubify
          chmod +x ~/tools/kepubify

      - name: Add tools to PATH
        run: echo "$HOME/tools" >> "$GITHUB_PATH"

      - name: Build book
        run: mdbook build

      - name: Generate EPUBs
        run: ./scripts/generate-epub.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
